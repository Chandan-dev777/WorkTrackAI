<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <!-- Concept 2: Stacked Layers + Orbit
       Three stacked abstract "day layers" with a circling AI orbit dot.
       Represents daily accumulation of intelligence. Modern SaaS feel. -->

  <!-- Three stacked rounded rectangles (daily layers) -->
  <rect x="22" y="62" width="56" height="12" rx="6" fill="#c7d2fe" opacity="0.7"/>
  <rect x="18" y="48" width="64" height="14" rx="7" fill="#a5b4fc" opacity="0.85"/>
  <rect x="14" y="32" width="72" height="16" rx="8" fill="url(#grad2)"/>

  <!-- AI orbit ring -->
  <ellipse cx="50" cy="55" rx="42" ry="38" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4 3" fill="none" opacity="0.5"/>

  <!-- Orbiting AI dot (with glow) -->
  <circle cx="88" cy="42" r="8" fill="#6366f1" opacity="0.15"/>
  <circle cx="88" cy="42" r="5" fill="url(#grad2)"/>
  <circle cx="88" cy="42" r="2" fill="white"/>

  <!-- Up-arrow inside top layer (progress) -->
  <path d="M44 36 L50 30 L56 36" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="50" y1="30" x2="50" y2="43" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="112" y="52" font-family="Inter, -apple-system, sans-serif" font-size="34" font-weight="700" fill="#1e293b" letter-spacing="-0.5">
    daily<tspan font-weight="800" fill="url(#grad2)">ops</tspan>
  </text>
  <!-- .ai badge -->
  <rect x="284" y="36" width="32" height="20" rx="6" fill="url(#grad2)"/>
  <text x="292" y="51" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="700" fill="white" letter-spacing="0.5">
    ai
  </text>

  <!-- Tagline -->
  <text x="112" y="76" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#64748b" letter-spacing="0.3">
    Your team's work, structured by AI
  </text>

  <!-- Subtle bottom bar accent -->
  <rect x="112" y="88" width="60" height="3" rx="1.5" fill="url(#grad2)" opacity="0.4"/>

  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
</svg>
