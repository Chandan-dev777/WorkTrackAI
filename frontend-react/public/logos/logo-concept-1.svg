<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <!-- Concept 1: Neural Pulse Calendar
       A calendar/day icon merged with an AI neural pulse wave.
       Clean geometric mark + wordmark -->

  <!-- Icon: Rounded square (calendar) with neural pulse inside -->
  <rect x="10" y="20" width="80" height="80" rx="16" fill="url(#grad1)" />

  <!-- Calendar top dots (binding) -->
  <circle cx="35" cy="20" r="4" fill="#1e293b"/>
  <circle cx="65" cy="20" r="4" fill="#1e293b"/>

  <!-- AI Neural pulse wave inside calendar -->
  <path d="M24 60 L34 60 L40 42 L48 75 L56 38 L62 68 L68 52 L76 60"
        stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Small AI sparkle -->
  <circle cx="78" cy="32" r="6" fill="#fbbf24" opacity="0.9"/>
  <path d="M78 28 L78 36 M74 32 L82 32" stroke="white" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="108" y="54" font-family="Inter, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#0f172a" letter-spacing="-1">
    Daily<tspan fill="url(#grad1)">Ops</tspan>
  </text>
  <text x="108" y="80" font-family="Inter, -apple-system, sans-serif" font-size="20" font-weight="300" fill="#64748b" letter-spacing="3">
    AI
  </text>

  <!-- Tagline -->
  <text x="108" y="100" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#94a3b8" letter-spacing="0.5">
    Intelligence in every update
  </text>

  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
</svg>
